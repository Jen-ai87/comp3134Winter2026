<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reflected XSS Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 60px auto; }
        input { padding: 8px; width: 100%; box-sizing: border-box; margin: 8px 0; }
        button { padding: 10px 20px; background: #333; color: #fff; border: none; cursor: pointer; }
        #output { margin-top: 20px; padding: 12px; border: 1px solid #ccc; min-height: 40px; }
    </style>
</head>
<body>
    <h1>Reflected XSS Demo</h1>
    <form id="xssForm">
        <input type="text" id="userInput" placeholder="Enter something..." />
        <button type="submit">Submit</button>
    </form>
    <div id="output"></div>

    <script>
        document.getElementById("xssForm").addEventListener("submit", function(event) {
            event.preventDefault();
            var value = document.getElementById("userInput").value;
            document.getElementById("output").innerHTML = value;
        });
    </script>
</body>
</html>
